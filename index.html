<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Mini Shop</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding-bottom: 70px;
      background: #f4f4f4;
    }

    .tab { display: none; padding: 16px; }
    .tab.active { display: block; }

    .product, .cart-item {
      background: #fff;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 8px;
    }

    select, button {
      margin-top: 6px;
      padding: 8px;
      width: 100%;
    }

    .nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      background: #fff;
      border-top: 1px solid #ccc;
    }

    .nav button {
      flex: 1;
      border: none;
      background: none;
      padding: 12px;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div id="shop" class="tab active">
  <h2>🛍 Магазин</h2>

  <div class="product">
    <b>Футболка</b><br>
    Цена: 20$
    <select id="shirt-size">
      <option>S</option>
      <option>M</option>
      <option>L</option>
      <option>XL</option>
    </select>
    <button onclick="addToCart('Футболка', 20, 'shirt-size')">Добавить</button>
  </div>

  <div class="product">
    <b>Худи</b><br>
    Цена: 40$
    <select id="hoodie-size">
      <option>S</option>
      <option>M</option>
      <option>L</option>
    </select>
    <button onclick="addToCart('Худи', 40, 'hoodie-size')">Добавить</button>
  </div>
</div>

<div id="cart" class="tab">
  <h2>📦 Корзина</h2>
  <div id="cart-items"></div>
  <b id="total"></b>
  <button onclick="openTab('payment')">Перейти к оплате</button>
</div>

<div id="payment" class="tab">
  <h2>💳 Оплата</h2>
  <p>Перевод на карту:</p>
  <b>1234 5678 9012 3456</b><br><br>
  <button onclick="sendOrder()">Я оплатил</button>
</div>

<div id="about" class="tab">
  <h2>ℹ️ О магазине</h2>
  <p>Mini App внутри Telegram</p>
</div>

<div class="nav">
  <button onclick="openTab('shop')">🛍</button>
  <button onclick="openTab('cart')">📦</button>
  <button onclick="openTab('payment')">💳</button>
  <button onclick="openTab('about')">ℹ️</button>
</div>

<script>
  let cart = [];

  const tg = window.Telegram?.WebApp;
  if (tg) tg.expand();

  function openTab(id) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if (id === 'cart') renderCart();
  }

  function addToCart(name, price, sizeId) {
    const size = document.getElementById(sizeId).value;
    cart.push({ name, price, size });
    alert('Добавлено в корзину');
  }

  function renderCart() {
    const box = document.getElementById('cart-items');
    box.innerHTML = '';
    let sum = 0;

    cart.forEach(item => {
      sum += item.price;
      box.innerHTML += `<div class="cart-item">
        ${item.name} (${item.size}) — ${item.price}$
      </div>`;
    });

    document.getElementById('total').innerText = 'Итого: ' + sum + '$';
  }

  function sendOrder() {
    const payload = {
      cart: cart
    };

    if (tg) {
      tg.sendData(JSON.stringify(payload));
      tg.close();
    } else {
      alert('Заказ: ' + JSON.stringify(payload));
    }
  }
</script>

</body>
</html>
