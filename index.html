<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Mini Shop</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f5f5f5; }
    .tab { display: none; padding: 16px; }
    .tab.active { display: block; }

    .nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      display: flex; background: #fff; border-top: 1px solid #ddd;
    }
    .nav button {
      flex: 1; padding: 12px; border: none; background: none;
      font-size: 14px;
    }

    .product {
      background: #fff; padding: 12px; margin-bottom: 12px;
      border-radius: 8px;
    }

    select, button {
      padding: 8px; margin-top: 6px;
    }

    .cart-item {
      background: #fff; padding: 10px; margin-bottom: 8px;
      border-radius: 6px;
    }
  </style>
</head>
<body>

<!-- 🛍 МАГАЗИН -->
<div id="shop" class="tab active">
  <h2>🛍 Магазин</h2>

  <div class="product">
    <b>Футболка</b><br>
    Цена: 20$
    <br>
    Размер:
    <select id="size-shirt">
      <option>S</option>
      <option>M</option>
      <option>L</option>
      <option>XL</option>
    </select>
    <br>
    <button onclick="addToCart('Футболка', 20, 'size-shirt')">
      Добавить
    </button>
  </div>

  <div class="product">
    <b>Худи</b><br>
    Цена: 40$
    <br>
    Размер:
    <select id="size-hoodie">
      <option>S</option>
      <option>M</option>
      <option>L</option>
    </select>
    <br>
    <button onclick="addToCart('Худи', 40, 'size-hoodie')">
      Добавить
    </button>
  </div>
</div>

<!-- 📦 КОРЗИНА -->
<div id="cart" class="tab">
  <h2>📦 Корзина</h2>
  <div id="cart-items"></div>
  <p><b id="total"></b></p>
  <button onclick="goToPayment()">Перейти к оплате</button>
</div>

<!-- 💳 ОПЛАТА -->
<div id="payment" class="tab">
  <h2>💳 Оплата</h2>
  <p>Оплати заказ переводом:</p>
  <p>
    💳 Карта: <b>1234 5678 9012 3456</b><br>
    👤 Получатель: <b>ИМЯ</b>
  </p>
  <button onclick="sendOrder()">Я оплатил</button>
</div>

<!-- ℹ️ О МАГАЗИНЕ -->
<div id="about" class="tab">
  <h2>ℹ️ О магазине</h2>
  <p>Простой магазин внутри Telegram Mini App.</p>
</div>

<!-- 🔽 НАВИГАЦИЯ -->
<div class="nav">
  <button onclick="openTab('shop')">🛍</button>
  <button onclick="openTab('cart')">📦</button>
  <button onclick="openTab('payment')">💳</button>
  <button onclick="openTab('about')">ℹ️</button>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();

  let cart = [];

  function openTab(id) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if (id === 'cart') renderCart();
  }

  function addToCart(name, price, sizeId) {
    const size = document.getElementById(sizeId).value;
    cart.push({ name, price, size });
    alert('Добавлено в корзину');
  }

  function renderCart() {
    const box = document.getElementById('cart-items');
    box.innerHTML = '';
    let sum = 0;

    cart.forEach((item, i) => {
      sum += item.price;
      box.innerHTML += `
        <div class="cart-item">
          ${item.name} (${item.size}) — ${item.price}$
        </div>
      `;
    });

    document.getElementById('total').innerText = 'Итого: ' + sum + '$';
  }

  function goToPayment() {
    openTab('payment');
  }

  function sendOrder() {
    tg.sendData(JSON.stringify({
      cart: cart,
      user: tg.initDataUnsafe.user
    }));
    tg.close();
  }
</script>

</body>
</html>
